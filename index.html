<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macro Signal Tracker v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0d0f13;
  --bg2:       #131720;
  --bg3:       #1a1f2e;
  --border:    #252d3d;
  --border2:   #1e2535;
  --txt:       #e2e8f0;
  --txt2:      #8c9ab0;
  --txt3:      #5a6478;
  --red:       #e84040;
  --red-bg:    rgba(232,64,64,.12);
  --amber:     #f59e0b;
  --amber-bg:  rgba(245,158,11,.1);
  --green:     #22c55e;
  --green-bg:  rgba(34,197,94,.1);
  --blue:      #3b82f6;
  --blue-bg:   rgba(59,130,246,.1);
  --accent:    #4f7cff;
  --radius:    8px;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans KR', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--txt);
  min-height: 100vh;
  font-size: 13px;
  line-height: 1.5;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.app { max-width: 1200px; margin: 0 auto; padding: 20px 16px 60px; }

.hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.hdr-left { display: flex; align-items: baseline; gap: 12px; }
.hdr-title {
  font-family: var(--mono); font-size: 14px; font-weight: 600;
  letter-spacing: .04em; color: var(--txt);
}
.hdr-version {
  font-family: var(--mono); font-size: 10px; color: var(--accent);
  background: var(--blue-bg); padding: 2px 6px; border-radius: 3px;
}
.hdr-right { display: flex; align-items: center; gap: 10px; }
.hdr-date { font-family: var(--mono); font-size: 11px; color: var(--txt3); }
.btn-sm {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: var(--radius);
  font-family: var(--mono); font-size: 11px; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--txt2); transition: all .15s;
}
.btn-sm:hover { border-color: var(--accent); color: var(--txt); }
.btn-sm svg { width: 12px; height: 12px; }

.summary-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 18px 20px; margin-bottom: 20px;
  position: relative; overflow: hidden;
}
.summary-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--red), var(--amber), var(--accent));
}
.summary-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 14px; }
.summary-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: .12em;
  color: var(--txt3); text-transform: uppercase; margin-bottom: 6px;
}
.summary-thesis {
  font-size: 13px; font-weight: 400; color: var(--txt2); line-height: 1.7;
  max-width: 720px;
  white-space: pre-line;
}
.summary-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.risk-badge {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  padding: 4px 10px; border-radius: 4px; letter-spacing: .06em;
}
.risk-critical { background: var(--red-bg); color: var(--red); border: 1px solid rgba(232,64,64,.3); }
.risk-high     { background: rgba(239,115,22,.12); color: #ef7316; border: 1px solid rgba(239,115,22,.3); }
.risk-moderate { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(245,158,11,.3); }
.risk-low      { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
.summary-stats { display: flex; gap: 20px; }
.stat-pill {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 11px; color: var(--txt2);
}
.stat-dot { width: 7px; height: 7px; border-radius: 50%; }
.stat-dot.r { background: var(--red); }
.stat-dot.a { background: var(--amber); }
.stat-dot.g { background: var(--green); }
.stat-num { font-weight: 600; color: var(--txt); }
.summary-week {
  font-family: var(--mono); font-size: 10px; color: var(--txt3);
  margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border2);
}

/* ── Score Card ─────────────────────────────────────────────── */
.score-wrap {
  margin-bottom: 16px;
}
.score-row {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}
/* 종합 카드 */
.score-main {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  position: relative; overflow: hidden;
}
.score-main::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--score-accent, var(--amber));
  border-radius: 10px 0 0 10px;
}
.score-dial { flex-shrink: 0; width: 64px; height: 64px; }
.score-dial svg { width: 100%; height: 100%; }
.score-info { flex: 1; min-width: 0; }
.score-info-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: .1em;
  color: var(--txt3); text-transform: uppercase; margin-bottom: 3px;
}
.score-info-main {
  font-family: var(--mono); font-size: 15px; font-weight: 600;
  line-height: 1.2; margin-bottom: 3px;
}
.score-info-signal {
  font-family: var(--mono); font-size: 10px; color: var(--txt3);
}
.score-info-signal b { font-weight: 600; }
/* 그룹 카드 */
.score-group {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 14px 16px;
}
.score-group-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: .1em;
  color: var(--txt3); text-transform: uppercase; margin-bottom: 6px;
}
.score-group-num {
  font-family: var(--mono); font-size: 28px; font-weight: 600;
  line-height: 1; margin-bottom: 3px;
}
.score-group-sub {
  font-family: var(--mono); font-size: 10px; color: var(--txt3);
}
/* 게이지 바 */
.score-gauge {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 10px;
}
.score-gauge-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: .1em;
  color: var(--txt3); text-transform: uppercase; margin-bottom: 8px;
}
.score-track {
  width: 100%; height: 6px; border-radius: 3px;
  background: linear-gradient(to right,
    #e84040 0%, #f59e0b 25%, #22c55e 50%, #f59e0b 75%, #e84040 100%);
  position: relative; margin-bottom: 5px;
}
.score-needle {
  position: absolute; top: -5px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--bg); border: 2px solid var(--needle-c, #f59e0b);
  box-shadow: 0 0 6px var(--needle-c, #f59e0b);
  transform: translateX(-50%);
  transition: left .5s cubic-bezier(.4,0,.2,1);
}
.score-track-labels {
  display: flex; justify-content: space-between;
  font-family: var(--mono); font-size: 9px; color: var(--txt3);
}
/* 세부 지표 그리드 */
.score-detail-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}
.score-detail-item {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 8px 10px;
}
.score-detail-name {
  font-family: var(--mono); font-size: 9px; color: var(--txt3);
  margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.score-detail-bar {
  width: 100%; height: 3px; background: var(--border);
  border-radius: 2px; margin-bottom: 4px; position: relative;
}
.score-detail-fill { height: 100%; border-radius: 2px; transition: width .5s ease; }
.score-detail-num {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
}
.score-section-header {
  font-family: var(--mono); font-size: 9px; letter-spacing: .1em;
  color: var(--txt3); text-transform: uppercase;
  margin: 8px 0 6px;
}

@media (max-width: 640px) {
  .score-row { grid-template-columns: 1fr; }
  .score-detail-grid { grid-template-columns: repeat(2, 1fr); }
}
/* ── /Score Card ─────────────────────────────────────────────── */

.tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.tab {
  padding: 5px 14px; border-radius: 6px;
  font-family: var(--mono); font-size: 11px; cursor: pointer;
  border: 1px solid var(--border2); background: transparent;
  color: var(--txt3); transition: all .15s; white-space: nowrap;
}
.tab:hover { border-color: var(--border); color: var(--txt2); }
.tab.active {
  background: var(--bg3); border-color: var(--accent);
  color: var(--accent); font-weight: 500;
}
.tab .tab-cnt {
  display: inline-flex; align-items: center; justify-content: center;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--border); font-size: 9px; margin-left: 5px;
  color: var(--txt2);
}
.tab.active .tab-cnt { background: rgba(79,124,255,.2); color: var(--accent); }

.panel { display: none; }
.panel.active { display: block; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 12px;
}

.card {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 14px 16px;
  position: relative; transition: all .2s;
  cursor: default;
}
.card:hover { border-color: var(--border); background: var(--bg3); }
.card.triggered { border-left: 3px solid var(--red); }
.card.watch { border-left: 3px solid var(--amber); }
.card.normal { border-left: 3px solid var(--border); }
.card.highlighted { box-shadow: 0 0 0 2px var(--accent); border-color: var(--accent); }
.card.dimmed { opacity: 0.35; }
.card.is-new::after {
  content: 'NEW'; position: absolute; top: 10px; right: 10px;
  font-family: var(--mono); font-size: 8px; letter-spacing: .1em;
  padding: 2px 5px; border-radius: 3px;
  background: var(--blue-bg); color: var(--accent); border: 1px solid rgba(79,124,255,.3);
}

.card-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px; gap: 8px;
}
.card-name { font-size: 13px; font-weight: 500; color: var(--txt); }
.card-badges { display: flex; align-items: center; gap: 5px; }

.badge-status {
  font-family: var(--mono); font-size: 9px; letter-spacing: .06em;
  padding: 2px 7px; border-radius: 3px; font-weight: 600;
}
.badge-triggered { background: var(--red-bg); color: var(--red); }
.badge-watch     { background: var(--amber-bg); color: var(--amber); }
.badge-normal    { background: var(--bg3); color: var(--txt3); }

.badge-type {
  font-family: var(--mono); font-size: 8px; letter-spacing: .06em;
  padding: 2px 5px; border-radius: 3px;
  background: var(--bg3); color: var(--txt3); border: 1px solid var(--border2);
}
.badge-type.core { color: var(--accent); border-color: rgba(79,124,255,.25); background: rgba(79,124,255,.06); }

.card-spark-row {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 8px; gap: 8px;
}
.card-val {
  font-family: var(--mono); font-size: 11px; font-weight: 400;
  color: var(--txt2); line-height: 1.6; flex: 1;
  white-space: pre-line;
}
.spark-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.spark-svg { display: block; }
.zscore-wrap {
  display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
}
.zscore-val {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
}
.zscore-val.zr { color: var(--red); }
.zscore-val.za { color: var(--amber); }
.zscore-val.zg { color: var(--green); }
.zscore-val.zn { color: var(--txt3); }
.zscore-bar-wrap { width: 48px; height: 3px; background: var(--border); border-radius: 2px; position: relative; }
.zscore-bar { height: 100%; border-radius: 2px; position: absolute; }
.zscore-center { position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: var(--txt3); }

.card-sub { font-size: 11px; color: var(--txt3); margin-bottom: 8px; }
.card-ctx {
  font-size: 12px; color: var(--txt2); margin-bottom: 10px;
  line-height: 1.65;
  white-space: pre-line;
}
.card-ctx p { margin-bottom: 6px; }
.card-ctx p:last-child { margin-bottom: 0; }
.card-thr {
  font-family: var(--mono); font-size: 10px; color: var(--txt3);
  padding: 6px 10px; background: var(--bg3); border-radius: 4px;
  margin-bottom: 8px; line-height: 1.55;
  white-space: pre-line;
}
.card-thr::before { content: '⚡ '; }

.tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
.tag {
  font-family: var(--mono); font-size: 9px; letter-spacing: .03em;
  padding: 2px 6px; border-radius: 3px;
}
.tag-r { background: var(--red-bg); color: var(--red); }
.tag-g { background: var(--green-bg); color: var(--green); }
.tag-n { background: var(--bg3); color: var(--txt3); }

.impacts-row { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
.impacts-label { font-family: var(--mono); font-size: 9px; color: var(--txt3); margin-right: 2px; }
.impact-chip {
  font-family: var(--mono); font-size: 9px;
  padding: 2px 7px; border-radius: 3px;
  background: rgba(79,124,246,.08); color: var(--accent);
  border: 1px solid rgba(79,124,255,.2);
  cursor: pointer; transition: all .15s;
}
.impact-chip:hover { background: rgba(79,124,255,.18); }

.changed-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--amber); flex-shrink: 0;
  box-shadow: 0 0 6px var(--amber);
}

.archive-section { margin-top: 32px; }
.archive-toggle {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; background: var(--bg2);
  border: 1px solid var(--border2); border-radius: var(--radius);
  cursor: pointer; width: 100%; text-align: left;
  font-family: var(--mono); font-size: 11px; color: var(--txt3);
  transition: all .15s;
}
.archive-toggle:hover { border-color: var(--border); color: var(--txt2); }
.archive-toggle svg { transition: transform .2s; }
.archive-toggle.open svg { transform: rotate(180deg); }
.archive-grid { display: none; margin-top: 12px; }
.archive-grid.open { display: block; }
.archive-card { opacity: 0.55; }
.archive-label {
  font-family: var(--mono); font-size: 8px; letter-spacing: .1em;
  padding: 2px 6px; border-radius: 3px;
  background: var(--bg3); color: var(--txt3); border: 1px solid var(--border2);
}

.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); z-index: 100;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; width: 420px; max-width: 95vw;
}
.modal-title {
  font-family: var(--mono); font-size: 13px; font-weight: 600;
  color: var(--txt); margin-bottom: 16px;
}
.field { margin-bottom: 14px; }
.field label {
  display: block; font-family: var(--mono); font-size: 10px;
  color: var(--txt3); margin-bottom: 5px; letter-spacing: .06em;
}
.field input, .field select {
  width: 100%; padding: 8px 10px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; color: var(--txt);
  font-family: var(--mono); font-size: 12px;
  outline: none; transition: border-color .15s;
}
.field input:focus, .field select:focus { border-color: var(--accent); }
.field-hint { font-size: 10px; color: var(--txt3); margin-top: 4px; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.btn-primary {
  padding: 8px 18px; border-radius: 6px;
  background: var(--accent); color: #fff;
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  border: none; cursor: pointer; transition: opacity .15s;
}
.btn-primary:hover { opacity: .85; }
.btn-cancel {
  padding: 8px 14px; border-radius: 6px;
  background: transparent; color: var(--txt2);
  font-family: var(--mono); font-size: 11px;
  border: 1px solid var(--border); cursor: pointer;
}

.state-box {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 12px; padding: 60px 20px;
  color: var(--txt3); font-family: var(--mono); font-size: 12px;
}
.spinner {
  width: 24px; height: 24px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.tooltip {
  position: fixed; z-index: 200; pointer-events: none;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 10px;
  font-family: var(--mono); font-size: 10px; color: var(--txt2);
  max-width: 220px; line-height: 1.5;
  opacity: 0; transition: opacity .1s;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
.tooltip.visible { opacity: 1; }

.graph-bar {
  height: 2px; background: linear-gradient(90deg, var(--border), var(--accent));
  margin: 20px 0 12px; border-radius: 1px;
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="state-box" id="loading">
    <div class="spinner"></div>
    <span>데이터 로딩 중...</span>
  </div>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-title">⚙ 업데이트 방법</div>
    <div style="font-family:var(--mono);font-size:10px;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">매주 워크플로우</div>
    <div style="background:var(--bg3);border-radius:6px;padding:14px;margin-bottom:16px">
      <div style="display:flex;gap:10px;margin-bottom:10px;font-size:12px;color:var(--txt2)"><span style="font-family:var(--mono);font-size:10px;color:var(--green);background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);padding:1px 6px;border-radius:3px;flex-shrink:0">01</span>Daily Shot 메일을 Claude에 공유</div>
      <div style="display:flex;gap:10px;margin-bottom:10px;font-size:12px;color:var(--txt2)"><span style="font-family:var(--mono);font-size:10px;color:var(--green);background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);padding:1px 6px;border-radius:3px;flex-shrink:0">02</span>Claude가 업데이트 JSON 생성</div>
      <div style="display:flex;gap:10px;margin-bottom:10px;font-size:12px;color:var(--txt2)"><span style="font-family:var(--mono);font-size:10px;color:var(--green);background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);padding:1px 6px;border-radius:3px;flex-shrink:0">03</span>GitHub 저장소의 <span style="font-family:var(--mono);color:var(--accent);margin:0 4px">macro_indicators.json</span> 파일 교체</div>
      <div style="display:flex;gap:10px;font-size:12px;color:var(--txt2)"><span style="font-family:var(--mono);font-size:10px;color:var(--green);background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);padding:1px 6px;border-radius:3px;flex-shrink:0">04</span>↻ 새로고침 → 자동 반영</div>
    </div>
    <div style="font-size:11px;color:var(--txt3);background:var(--bg3);border-left:2px solid var(--border);padding:8px 12px;border-radius:0 4px 4px 0">
      <span style="font-family:var(--mono);color:var(--accent)">macro_indicators.json</span> 파일을 이 HTML과 같은 저장소에 두면 됩니다. 토큰·Gist 불필요.
    </div>
    <div class="modal-btns">
      <button class="btn-primary" onclick="closeSettings()">확인</button>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const GROUPS = {
  energy_geo: '에너지·지정학',
  inflation:  '인플레이션',
  growth:     '경기·성장',
  rates:      '금리·채권',
  positioning:'포지셔닝',
  korea:      '한국',
  liquidity:  '유동성',
  sentiment:  '심리지표',
  credit:     '크레딧',
  growth_sentiment: '경기·심리',
  korea_asia: '한국·아시아'
};

let state = {
  data: null,
  activeTab: 'all',
  highlightIds: null,
  archivedOpen: false,
};

const DATA_FILE = 'macro_indicators.json';

async function fetchData() {
  try {
    const res = await fetch(DATA_FILE + '?t=' + Date.now());
    if (res.ok) {
      const parsed = await res.json();
      state.data = Array.isArray(parsed)
        ? { summary: null, indicators: parsed }
        : parsed;
      render();
      return;
    }
    throw new Error('macro_indicators.json 파일을 찾을 수 없습니다.');
  } catch (e) {
    renderError(e.message);
  }
}

// ── Text Formatter ────────────────────────────────────────────
function formatCtx(text) {
  if (!text) return '';
  return text
    .replace(/\. ([가-힣])/g, '.\n$1')
    .replace(/\. ([0-9]{1,2}\/[0-9]{1,2})/g, '.\n$1')
    .replace(/\. (WSJ|Daily Shot|Bloomberg|Reuters|BofA|Goldman|Barclays|UBS|Oxford|Dimon|Fed |IMF|OECD|WTO|UNCTAD|ISM |CPI|NFP|GDPNow|IRGC)/g, '.\n$1')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}
function formatVal(text) {
  if (!text) return '';
  return text.replace(/ · /g, '\n');
}
function formatThesis(text) {
  if (!text) return '';
  return text
    .replace(/\. ([가-힣])/g, '.\n$1')
    .replace(/\. ([0-9]{1,2}\/)/g, '.\n$1')
    .replace(/\. (WSJ|Daily Shot|Bloomberg|Dimon|Goldman|BofA|Fed |ISM |GDPNow|NFP)/g, '.\n$1')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

// ── Score Card ────────────────────────────────────────────────
function scoreColor(s) {
  if (s <= 20) return '#e84040';
  if (s <= 35) return '#f59e0b';
  if (s <= 50) return '#ef7316';
  if (s <= 65) return '#22c55e';
  if (s <= 80) return '#f59e0b';
  return '#e84040';
}
function scoreLabel(s) {
  if (s <= 20) return '⚡ Extreme Stress';
  if (s <= 35) return '😨 Stress';
  if (s <= 50) return '⚠️ Caution';
  if (s <= 65) return '😐 Neutral';
  if (s <= 80) return '😄 Greed';
  return '🔥 Extreme Greed';
}
function scoreSignal(s) {
  if (s <= 20) return 'Strong Buy';
  if (s <= 35) return 'Accumulate';
  if (s <= 50) return 'Watch';
  if (s <= 65) return 'Hold';
  if (s <= 80) return 'Reduce';
  return 'Strong Sell';
}

const IND_LABELS = {
  fed_balance_sheet: 'Fed BS',
  sofr_repo_stress:  'SOFR',
  tga_balance:       'TGA',
  mmf_flow:          'MMF',
  credit_spread_hy:  'HY Sprd',
  cnn_fear_greed:    'F&G',
  aaii_bull_bear:    'AAII',
  sp500_rsi:         'RSI',
  put_call_ratio:    'P/C',
  vix_term_structure:'VIX TS',
};

// scores가 없으면 z-score에서 즉석 계산
const SCORE_PARAMS = {
  fed_balance_sheet:  { z: -1.3, d: +1, w: 1.0 },
  sofr_repo_stress:   { z:  0.1, d: -1, w: 1.0 },
  tga_balance:        { z:  0.7, d: -1, w: 0.8 },
  mmf_flow:           { z:  2.0, d: -1, w: 0.8 },
  credit_spread_hy:   { z:  0.4, d: -1, w: 1.2 },
  cnn_fear_greed:     { z: -1.3, d: +1, w: 1.0 },
  aaii_bull_bear:     { z: -1.6, d: +1, w: 1.0 },
  sp500_rsi:          { z:  0.3, d: +1, w: 0.8 },
  put_call_ratio:     { z:  0.8, d: -1, w: 1.0 },
  vix_term_structure: { z: -1.0, d: +1, w: 1.2 },
};
const LIQ_IDS  = ['fed_balance_sheet','sofr_repo_stress','tga_balance','mmf_flow','credit_spread_hy'];
const SENT_IDS = ['cnn_fear_greed','aaii_bull_bear','sp500_rsi','put_call_ratio','vix_term_structure'];

function z2score(z, d) {
  return Math.round(((Math.max(-3, Math.min(3, z * d)) + 3) / 6) * 100);
}

function computeScores(indicators) {
  // indicators 배열에서 z-score 실시간 반영
  const idxMap = {};
  indicators.forEach(i => { idxMap[i.id] = i; });

  const allIds = [...LIQ_IDS, ...SENT_IDS];
  const details = { liquidity: {}, sentiment: {} };

  allIds.forEach(id => {
    const p = SCORE_PARAMS[id];
    // 실제 지표가 있으면 그 z_score 우선
    const z = (idxMap[id] && typeof idxMap[id].z_score === 'number')
      ? idxMap[id].z_score : p.z;
    const sc = z2score(z, p.d);
    if (LIQ_IDS.includes(id)) details.liquidity[id] = { score: sc, z };
    else details.sentiment[id] = { score: sc, z };
  });

  function grpScore(ids, grpDetails) {
    let tw = 0, tws = 0;
    ids.forEach(id => {
      const w = SCORE_PARAMS[id].w;
      tws += grpDetails[id].score * w;
      tw  += w;
    });
    return Math.round(tws / tw);
  }

  const liq  = grpScore(LIQ_IDS,  details.liquidity);
  const sent = grpScore(SENT_IDS, details.sentiment);
  return {
    composite: Math.round((liq + sent) / 2),
    liquidity: liq,
    sentiment: sent,
    details
  };
}

function renderScoreCard(summary, indicators) {
  // JSON에 scores 있으면 사용, 없으면 실시간 계산
  const sc = summary?.scores || computeScores(indicators);

  const liq  = sc.liquidity;
  const sent = sc.sentiment;
  const cc = scoreColor(comp);

  const CIRC = 175.9;

  const dialSVG = `<svg viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="28" fill="none" stroke="#1e2535" stroke-width="6"/>
    <circle cx="32" cy="32" r="28" fill="none"
      stroke="${cc}" stroke-width="6"
      stroke-dasharray="${compArc.toFixed(1)} ${CIRC}"
      stroke-linecap="round"
      transform="rotate(-90 32 32)"
      style="transition:stroke-dasharray .6s ease"/>
    <text x="32" y="35" font-family="IBM Plex Mono,monospace"
      font-size="13" font-weight="600" fill="${cc}"
      text-anchor="middle" dominant-baseline="middle">${comp}</text>

  // 세부 지표 렌더
  function detailItems(ids, grpDet) {
    return ids.map(id => {
      const d = grpDet[id];
      const c = scoreColor(d.score);
      return `<div class="score-detail-item">
        <div class="score-detail-name">${IND_LABELS[id]}</div>
        <div class="score-detail-bar">
          <div class="score-detail-fill" style="width:${d.score}%;background:${c}"></div>
        </div>
        <div class="score-detail-num" style="color:${c}">${d.score}</div>
      </div>`;
    }).join('');
  }

  return `<div class="score-wrap">
    <div class="score-row">
      <!-- 종합 점수 -->
      <div class="score-main" style="--score-accent:${cc}">
        <div class="score-dial">${dialSVG}</div>
        <div class="score-info">
          <div class="score-info-label">종합 매크로 점수</div>
          <div class="score-info-main" style="color:${cc}">${scoreLabel(comp)}</div>
          <div class="score-info-signal">신호: <b style="color:${cc}">${scoreSignal(comp)}</b></div>
        </div>
      </div>
      <!-- Liquidity -->
      <div class="score-group">
        <div class="score-group-label">💧 Liquidity</div>
        <div class="score-group-num" style="color:${lc}">${liq}</div>
        <div class="score-group-sub">${scoreLabel(liq)}</div>
      </div>
      <!-- Sentiment -->
      <div class="score-group">
        <div class="score-group-label">🧠 Sentiment</div>
        <div class="score-group-num" style="color:${scc}">${sent}</div>
        <div class="score-group-sub">${scoreLabel(sent)}</div>
      </div>
    </div>

    <!-- 게이지 바 -->
    <div class="score-gauge">
      <div class="score-gauge-label">스트레스 게이지 — 낮을수록 역발상 매수 구간</div>
      <div class="score-track">
        <div class="score-needle" style="left:${comp}%;--needle-c:${cc}"></div>
      </div>
      <div class="score-track-labels">
        <span>⚡ Extreme Stress (매수)</span>
        <span>중립 50</span>
        <span>🔥 Extreme Greed (매도)</span>
      </div>
    </div>

    <!-- 세부 지표 -->
    <div class="score-section-header">💧 Liquidity 세부</div>
    <div class="score-detail-grid">${detailItems(LIQ_IDS, sc.details.liquidity)}</div>
    <div class="score-section-header" style="margin-top:10px">🧠 Sentiment 세부</div>
    <div class="score-detail-grid">${detailItems(SENT_IDS, sc.details.sentiment)}</div>
  </div>`;
}

// ── Z-Score ───────────────────────────────────────────────────
function resolveStatus(ind) {
  if (typeof ind.z_score === 'number') {
    const z = ind.z_score;
    if (z >= 2 || z <= -2) return 'triggered';
    if (z >= 1.5 || z <= -1.5) return 'watch';
    return 'normal';
  }
  return ind.status || 'normal';
}

function sparklineSVG(history, status) {
  if (!history || history.length < 2) return '';
  const vals = history.map(h => h.val);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const W = 72, H = 26, PAD = 2;
  const pts = vals.map((v, i) => {
    const x = PAD + (i / (vals.length - 1)) * (W - PAD * 2);
    const y = H - PAD - ((v - min) / range) * (H - PAD * 2);
    return [x, y];
  });
  const pathD = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const fillD = pathD + ` L${pts[pts.length-1][0]},${H} L${pts[0][0]},${H} Z`;
  const color = status === 'triggered' ? '#e84040' : status === 'watch' ? '#f59e0b' : '#4f7cff';
  const fillColor = status === 'triggered' ? 'rgba(232,64,64,.08)' : status === 'watch' ? 'rgba(245,158,11,.08)' : 'rgba(79,124,255,.08)';
  const [lx, ly] = pts[pts.length - 1];
  return `<svg class="spark-svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <path d="${fillD}" fill="${fillColor}" stroke="none"/>
    <path d="${pathD}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="2.5" fill="${color}"/>
  </svg>`;
}

function zscoreBadge(z_score) {
  if (typeof z_score !== 'number') return '';
  const z = z_score;
  const cls = Math.abs(z) >= 2 ? 'zr' : Math.abs(z) >= 1.5 ? 'za' : z > 0 ? 'zn' : 'zg';
  const sign = z > 0 ? '+' : '';
  const label = `${sign}${z.toFixed(1)}σ`;
  const pct = Math.min(Math.max((z + 3) / 6 * 100, 0), 100);
  const left = Math.min(50, pct), width = Math.abs(pct - 50);
  const barColor = Math.abs(z) >= 2 ? '#e84040' : Math.abs(z) >= 1.5 ? '#f59e0b' : '#4f7cff';
  return `<div class="zscore-wrap" title="Z-Score: ${label}">
    <span class="zscore-val ${cls}">${label}</span>
    <div class="zscore-bar-wrap">
      <div class="zscore-center"></div>
      <div class="zscore-bar" style="left:${left.toFixed(1)}%;width:${width.toFixed(1)}%;background:${barColor};${z < 0 ? 'right:' + (100-left).toFixed(1) + '%;left:auto;' : ''}"></div>
    </div>
  </div>`;
}

function tagHTML(t) {
  const cls = t.endsWith('(r)') ? 'tag-r' : t.endsWith('(g)') ? 'tag-g' : 'tag-n';
  const label = t.replace(/\([rng]\)$/, '');
  return `<span class="tag ${cls}">${label}</span>`;
}

function impactHTML(id, impacts) {
  if (!impacts || impacts.length === 0) return '';
  const chips = impacts.map(imp =>
    `<span class="impact-chip" onclick="highlightImpact('${id}', ${JSON.stringify(impacts)})" title="${imp}">${imp}</span>`
  ).join('');
  return `<div class="impacts-row">
    <span class="impacts-label">IMPACTS:</span>${chips}
  </div>`;
}

function renderCard(ind, archived = false) {
  const status = resolveStatus(ind);
  const spark = sparklineSVG(ind.history_data, status);
  const zBadge = zscoreBadge(ind.z_score);
  const isHL = state.highlightIds;
  const cardClass = [
    'card', status,
    ind.isNew ? 'is-new' : '',
    archived ? 'archive-card' : '',
    isHL && isHL.has(ind.id) ? 'highlighted' : '',
    isHL && !isHL.has(ind.id) ? 'dimmed' : ''
  ].filter(Boolean).join(' ');

  const statusLabel = { triggered: 'Triggered', watch: 'Watch', normal: 'Normal' }[status];
  const changedDot = ind.isChanged ? '<div class="changed-dot" title="이번 업데이트 변경됨"></div>' : '';
  const archiveLabel = archived ? '<span class="archive-label">ARCHIVED</span>' : '';
  const formattedVal = formatVal(ind.val || '');
  const sparkRow = (spark || zBadge)
    ? `<div class="card-spark-row">
        <span class="card-val">${formattedVal}</span>
        <div class="spark-wrap">${spark}${zBadge}</div>
       </div>`
    : `<div class="card-val" style="margin-bottom:10px">${formattedVal}</div>`;
  const formattedCtx = formatCtx(ind.ctx || '');
  const formattedThr = ind.threshold ? formatCtx(ind.threshold) : '';

  return `<div class="card ${cardClass}" id="card-${ind.id}" data-id="${ind.id}">
    <div class="card-top">
      <span class="card-name">${ind.title}</span>
      <div class="card-badges">
        ${changedDot}${archiveLabel}
        <span class="badge-type${ind.type === 'core' ? ' core' : ''}">${ind.type === 'core' ? 'CORE' : 'THEME'}</span>
        <span class="badge-status badge-${status}">${statusLabel}</span>
      </div>
    </div>
    <div class="card-sub">${ind.sub || ''}</div>
    ${sparkRow}
    <div class="card-ctx">${formattedCtx}</div>
    ${formattedThr ? `<div class="card-thr">${formattedThr}</div>` : ''}
    <div class="tags">${(ind.tags || []).map(tagHTML).join('')}</div>
    ${impactHTML(ind.id, ind.impacts)}
  </div>`;
}

function highlightImpact(sourceId, impacts) {
  const ids = new Set([sourceId, ...impacts]);
  const sameSet = state.highlightIds
    && [...ids].every(id => state.highlightIds.has(id))
    && state.highlightIds.size === ids.size;
  state.highlightIds = sameSet ? null : ids;
  document.querySelectorAll('.card').forEach(card => {
    const id = card.dataset.id;
    card.classList.remove('highlighted', 'dimmed');
    if (state.highlightIds) {
      if (state.highlightIds.has(id)) card.classList.add('highlighted');
      else card.classList.add('dimmed');
    }
  });
}

function renderSummary(summary, indicators) {
  const triggered = indicators.filter(i => resolveStatus(i) === 'triggered').length;
  const watch     = indicators.filter(i => resolveStatus(i) === 'watch').length;
  const normal    = indicators.filter(i => resolveStatus(i) === 'normal').length;

  if (!summary) {
    return `<div class="summary-card">
      <div class="summary-top"><div>
        <div class="summary-label">Weekly Thesis</div>
        <div class="summary-thesis" style="color:var(--txt3);font-size:12px;">summary 필드가 없습니다.</div>
      </div></div>
      <div class="summary-stats" style="margin-top:10px">
        <div class="stat-pill"><div class="stat-dot r"></div><span class="stat-num">${triggered}</span> Triggered</div>
        <div class="stat-pill"><div class="stat-dot a"></div><span class="stat-num">${watch}</span> Watch</div>
        <div class="stat-pill"><div class="stat-dot g"></div><span class="stat-num">${normal}</span> Normal</div>
      </div>
    </div>`;
  }

  const riskClass = `risk-${summary.risk_level || 'moderate'}`;
  const riskLabels = { critical:'⚠ CRITICAL', high:'▲ HIGH', moderate:'◆ MODERATE', low:'▽ LOW' };
  const formattedThesis = formatThesis(summary.thesis || summary.key_thesis || '');

  return `<div class="summary-card">
    <div class="summary-top">
      <div>
        <div class="summary-label">Weekly Thesis · ${summary.date || ''}</div>
        <div class="summary-thesis">${formattedThesis}</div>
      </div>
      <div class="summary-meta">
        <span class="risk-badge ${riskClass}">${riskLabels[summary.risk_level] || 'MODERATE'}</span>
      </div>
    </div>
    <div class="summary-stats" style="margin-top:10px">
      <div class="stat-pill"><div class="stat-dot r"></div><span class="stat-num">${triggered}</span> Triggered</div>
      <div class="stat-pill"><div class="stat-dot a"></div><span class="stat-num">${watch}</span> Watch</div>
      <div class="stat-pill"><div class="stat-dot g"></div><span class="stat-num">${normal}</span> Normal</div>
    </div>
    <div class="summary-week">
      ${summary.week ? `Week: ${summary.week}` : ''}
      ${summary.updated_by ? ` · Source: ${summary.updated_by}` : ''}
    </div>
  </div>`;
}

// ── Main Render ───────────────────────────────────────────────
function render() {
  const { data } = state;
  const indicators = (data.indicators || data || []).filter(i => !i.isArchived);
  const archived   = (data.indicators || data || []).filter(i => i.isArchived);

  const groupCounts = {};
  indicators.forEach(ind => {
    groupCounts[ind.group] = (groupCounts[ind.group] || 0) + 1;
  });

  const tabAll = `<button class="tab ${state.activeTab === 'all' ? 'active' : ''}" onclick="switchTab('all')">
    전체 <span class="tab-cnt">${indicators.length}</span>
  </button>`;

  // 동적으로 그룹 탭 생성 (GROUPS에 없는 그룹도 표시)
  const allGroups = { ...GROUPS };
  Object.keys(groupCounts).forEach(g => { if (!allGroups[g]) allGroups[g] = g; });
  const groupTabs = Object.entries(allGroups).map(([g, label]) => {
    const cnt = groupCounts[g] || 0;
    if (!cnt) return '';
    return `<button class="tab ${state.activeTab === g ? 'active' : ''}" onclick="switchTab('${g}')">
      ${label} <span class="tab-cnt">${cnt}</span>
    </button>`;
  }).join('');

  const activeInds = state.activeTab === 'all'
    ? indicators
    : indicators.filter(i => i.group === state.activeTab);

  activeInds.sort((a, b) => {
    const order = { triggered: 0, watch: 1, normal: 2 };
    const sa = order[resolveStatus(a)] ?? 2;
    const sb = order[resolveStatus(b)] ?? 2;
    if (sa !== sb) return sa - sb;
    return (a.type === 'core' ? 0 : 1) - (b.type === 'core' ? 0 : 1);
  });

  const cards = activeInds.map(ind => renderCard(ind)).join('');
  const archiveSection = archived.length > 0
    ? `<div class="archive-section">
        <button class="archive-toggle ${state.archivedOpen ? 'open' : ''}" onclick="toggleArchive()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="12" height="12"><path d="M4 6l4 4 4-4"/></svg>
          보관된 지표 (${archived.length}개) — 이슈 종료 처리됨
        </button>
        <div class="archive-grid ${state.archivedOpen ? 'open' : ''}">
          <div class="grid">${archived.map(i => renderCard(i, true)).join('')}</div>
        </div>
      </div>`
    : '';

  const lastUpdate = data.summary?.date
    || indicators.filter(i => i.updatedDate).map(i => i.updatedDate).sort().reverse()[0]
    || '—';

  document.getElementById('app').innerHTML = `
    <div class="hdr">
      <div class="hdr-left">
        <div class="hdr-title">MACRO SIGNAL TRACKER</div>
        <div class="hdr-version">v2</div>
      </div>
      <div class="hdr-right">
        <div class="hdr-date">${lastUpdate}</div>
        <button class="btn-sm" onclick="fetchData()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13.5 8A5.5 5.5 0 112.5 5"/><path d="M2.5 2v3h3"/></svg>
          새로고침
        </button>
        <button class="btn-sm" onclick="openSettings()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 1.5V3m0 10v1.5M1.5 8H3m10 0h1.5m-2.4-4.6-1.05 1.05M4.95 11.05 3.9 12.1M12.1 12.1l-1.05-1.05M4.95 4.95 3.9 3.9"/></svg>
          설정
        </button>
      </div>
    </div>
    ${renderSummary(data.summary, indicators)}
    ${renderScoreCard(data.summary, indicators)}
    <div class="tabs">${tabAll}${groupTabs}</div>
    <div class="grid">${cards}</div>
    ${archiveSection}`;
}

function switchTab(tab) {
  state.activeTab = tab;
  state.highlightIds = null;
  render();
}
function toggleArchive() {
  state.archivedOpen = !state.archivedOpen;
  const grid = document.querySelector('.archive-grid');
  const btn  = document.querySelector('.archive-toggle');
  if (grid) grid.classList.toggle('open', state.archivedOpen);
  if (btn)  btn.classList.toggle('open', state.archivedOpen);
}
function openSettings()  { document.getElementById('settingsModal').classList.add('open'); }
function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }

function renderError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="hdr">
      <div class="hdr-left"><div class="hdr-title">MACRO SIGNAL TRACKER</div><div class="hdr-version">v2</div></div>
      <div class="hdr-right">
        <button class="btn-sm" onclick="fetchData()">↻ 재시도</button>
        <button class="btn-sm" onclick="openSettings()">⚙ 설정</button>
      </div>
    </div>
    <div class="state-box" style="min-height:300px">
      <div style="color:var(--red)">데이터 로드 실패</div>
      <div style="color:var(--txt3);font-size:11px;">${msg}</div>
      <button class="btn-primary" onclick="fetchData()">재시도</button>
    </div>`;
}

const tip = document.getElementById('tooltip');
document.addEventListener('mousemove', e => {
  if (tip.classList.contains('visible')) {
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top  = (e.clientY - 8) + 'px';
  }
});

fetchData();
</script>
</body>
</html>
